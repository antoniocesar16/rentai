<VirtualHost *:80>
    ServerName rentai.com.br
    ServerAlias www.rentai.com.br
    ServerAdmin webmaster@rentai.com.br
    DocumentRoot /var/www/rentai/public

    <Directory /var/www/rentai/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/rentai_error.log
    CustomLog ${APACHE_LOG_DIR}/rentai_access.log combined
</VirtualHost>
